set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g base-index 1

set -g default-terminal "xterm-256color"
set -g mouse on
set -g history-limit 100000

# better-mouse-mode options
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"
set -g @scroll-without-changing-pane "on"

setw -g mode-keys vi
bind - copy-mode
# mimic vim behavior
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear
bind p paste-buffer
set-option -g prefix C-x
bind-key C-x send-prefix

setw -g word-separators ' ,;()'

if-shell '[[ $(env | grep XDG_SESSION_TYPE | cut -d"=" -f2) = wayland ]]' {
	set -s copy-command 'wl-copy'
} {
	set -s copy-command 'xsel -i'
}

# This allows for middle mouse paste (from other apps) without having to press shift.
bind -n MouseDown2Pane run "tmux setb -b primary_selection -- \
	\"$([[ $(env | grep XDG_SESSION_TYPE | cut -d"=" -f2) = wayland ]] && wl-paste --primary || xsel -o)\"; \
	tmux pasteb -b primary_selection; tmux deleteb -b primary_selection"

# The below click bindings are taken as their default values and I just replace copy-pipe-and-cancel with copy-pipe-no-clear
bind -T copy-mode-vi DoubleClick1Pane  select-pane \; send -X select-word \; run-shell -d 0.3 \; send -X copy-pipe-no-clear
bind -n DoubleClick1Pane  select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send -M } \
	{ copy-mode -H ; send -X select-word ; run-shell -d 0.3 ; send -X copy-pipe-no-clear }
bind -T copy-mode-vi TripleClick1Pane  select-pane \; send -X select-word \; run-shell -d 0.3 \; send -X copy-pipe-no-clear
bind -n TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send -M } \
	{ copy-mode -H ; send-keys -X select-line ; run-shell -d 0.3 ; send -X copy-pipe-no-clear }

# Use left mouse key to clear a selection. It actually seems that the order matters in
# the sense this needs to be before MouseDragEnd1Pane otherwise the selection is
# automatically cleared at the drag end.
bind -T copy-mode-vi MouseDown1Pane select-pane\; send -X clear-selection
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear
# Use right click to exit copy mode
bind -T copy-mode-vi MouseDown3Pane send -X cancel

# handling panes
bind -n C-h split-window -h -c "#{pane_current_path}"
bind -n C-v split-window -v -c "#{pane_current_path}"
bind -n C-q killp

# switch panes using Alt-arrow without prefix
bind -n C-S-left select-pane -L
bind -n C-S-Down select-pane -D
bind -n C-S-Up select-pane -U
bind -n C-S-Right select-pane -R

bind -n S-Up resize-pane -U 5
bind -n S-Down resize-pane -D 5
bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5

# Shift arrow to switch windows
bind -n S-M-Left  previous-window
bind -n S-M-Right next-window
bind -n C-s command-prompt -p "Name of new window: " "new-window -n '%%'"

# tmux-continuum options
set -g @continuum-restore "on"
set -g @continuum-save-interval "15"
set -g @resurrect-processes ":all:"
set -g @resurrect-restore "C-t"

# THEME
# Automatically set window title
set-option -g automatic-rename on
set-option -g set-titles on
set-option -g set-titles-string "#H@#{s,$HOME,~,:pane_current_path}"
set -g status-interval 1

# statusbar
set -g status-position top
set -g @dracula-plugins "git cpu-usage ram-usage"
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon session
set -g @dracula-border-contrast true
set -g @dracula-git-show-current-symbol ✓
set -g @dracula-weather-colors "green dark_gray"
set -g @dracula-git-colors "dark_gray cyan"
set -g @dracula-git-no-untracked-files true
set -g @dracula-git-show-remote-status true

# r for reloading config file
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."

run '~/.tmux/plugins/tpm/tpm'
